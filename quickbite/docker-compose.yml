services:
  backend:
    build: ./backend
    container_name: quickbite-backend
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=*
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: quickbite-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
